  <style>
    html {
      background: var(--site-bg);
    }

    body.chamber-page {
      --chamber-ink: var(--site-text);
      --chamber-paper: var(--site-surface);
      --chamber-paper-soft: var(--site-surface-strong);
      --chamber-green: var(--site-accent);
      background: var(--site-bg);
      color: var(--chamber-ink);
    }

    body.chamber-page::after {
      display: none;
    }

    body.chamber-page .header {
      background: var(--site-bg);
      border-bottom: 1px solid var(--site-border);
    }

    body.chamber-page .main,
    body.chamber-page .footer {
      max-width: min(1060px, calc(100vw - 40px));
    }

    body.chamber-page .post-single {
      background: rgba(18, 20, 18, 0.9);
      border: 1px solid var(--site-border);
      box-shadow: none;
      padding: 1rem 1rem 2rem;
    }

    body.chamber-page .post-single::before {
      content: none;
    }

    .chamber-intro {
      border-bottom: 1px solid var(--site-border);
      margin: 0 auto 1.2rem;
      max-width: 760px;
      padding: 0 0 1rem;
      text-align: left;
      text-wrap: balance;
    }

    .chamber-intro h1 {
      color: var(--site-accent-strong);
      font-size: clamp(1.55rem, 4vw, 2.1rem);
      line-height: 1.05;
      margin: 0 0 0.35rem;
      text-transform: none;
    }

    .chamber-intro p {
      color: var(--site-text-muted);
      margin: 0;
    }

    .chamber-room {
      margin: 0 auto;
      max-width: 560px;
      text-align: center;
    }

    .chamber-panel {
      display: grid;
      min-height: auto;
      overflow: visible;
      padding: 0.8rem 0 0.4rem;
      place-items: center;
      position: relative;
    }

    .chamber-link-box {
      display: grid;
      justify-items: center;
      width: 100%;
    }

    .chamber-link-box > summary {
      cursor: pointer;
      display: grid;
      justify-items: center;
      list-style: none;
      outline: none;
      width: 100%;
    }

    .chamber-link-box > summary::-webkit-details-marker {
      display: none;
    }

    .chamber-link-box > summary:focus-visible .chamber-instrument {
      outline: 2px solid var(--chamber-green);
      outline-offset: 6px;
    }

    .chamber-instrument {
      filter: saturate(0.86) contrast(1.08) drop-shadow(14px 18px 10px rgba(207, 232, 92, 0.12));
      image-rendering: pixelated;
      max-height: clamp(240px, 45vw, 430px);
      object-fit: contain;
      position: relative;
      transform-origin: center bottom;
      transition:
        filter 180ms ease,
        transform 180ms ease;
      width: min(340px, 74vw);
      z-index: 3;
    }

    .chamber-instrument:hover {
      filter: saturate(0.92) contrast(1.12) drop-shadow(14px 18px 10px rgba(207, 232, 92, 0.18));
      transform: rotate(2deg) translateY(-2px);
    }

    .chamber-link-list {
      background: var(--chamber-paper-soft);
      border: 1px dashed var(--site-border);
      box-shadow: none;
      color: var(--site-text-muted);
      margin: 1rem auto 0;
      max-width: min(520px, 100%);
      padding: 0.8rem 1rem;
      text-align: left;
      width: 100%;
    }

    .chamber-link-list ol {
      margin: 0;
      padding-left: 1.3rem;
    }

    .chamber-link-list li + li {
      margin-top: 0.45rem;
    }

    .chamber-link-list a {
      color: var(--site-accent);
      overflow-wrap: anywhere;
    }

    .chamber-empty-note {
      background: var(--chamber-paper-soft);
      border: 1px dashed var(--site-border);
      box-shadow: none;
      margin: 1.15rem auto 0;
      max-width: 640px;
      padding: 0.8rem;
      text-align: center;
    }

    .chamber-empty-note p {
      color: var(--site-text-muted);
      font-size: 0.86rem;
      line-height: 1.6;
      margin: 0;
    }

    @media screen and (max-width: 899px) {
      body.chamber-page .main,
      body.chamber-page .footer {
        max-width: var(--mobile-content-width);
        width: var(--mobile-content-width);
      }

      body.chamber-page .header {
        box-sizing: border-box;
      }

      .chamber-intro {
        padding-inline: 0;
        text-align: left;
      }

    }

    @media screen and (max-width: 520px) {
      body.chamber-page .header {
        width: min(100%, 390px);
      }

      body.chamber-page .main,
      body.chamber-page .footer {
        max-width: min(var(--mobile-content-width), 354px);
        width: min(var(--mobile-content-width), 354px);
      }

      .chamber-room,
      .chamber-empty-note {
        max-width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .chamber-panel {
        transition: none;
      }

      .chamber-room:hover .chamber-panel,
      .chamber-panel:hover {
        transform: none;
      }

      .chamber-instrument {
        transition: none;
      }

      .chamber-instrument:hover {
        transform: none;
      }
    }
  </style>
</head>
