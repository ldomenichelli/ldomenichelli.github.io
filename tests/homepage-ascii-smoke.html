<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Homepage ASCII Smoke Test</title>
  <style>
    body {
      background: #111;
      color: #f5f5f5;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      margin: 0;
      padding: 16px;
    }

    iframe {
      border: 0;
      height: 2200px;
      width: 1440px;
    }

    pre {
      line-height: 1.45;
      margin: 0 0 16px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <pre id="log">Running...</pre>
  <iframe id="frame" src="/"></iframe>

  <script>
    const logEl = document.getElementById('log');
    const frame = document.getElementById('frame');
    const results = [];
    const params = new URLSearchParams(window.location.search);
    const frameWidth = Number(params.get('width') || '1440');

    frame.style.width = `${frameWidth}px`;

    function log(message) {
      results.push(message);
      logEl.textContent = results.join('\n');
    }

    function assert(condition, message) {
      if (!condition) {
        throw new Error(message);
      }

      log(`PASS ${message}`);
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    frame.addEventListener('load', () => {
      run().catch((error) => {
        log(`FAIL ${error.message}`);
        document.body.dataset.testStatus = 'FAIL';
      });
    });

    async function run() {
      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      const runtimeErrors = [];

      win.addEventListener('error', (event) => {
        runtimeErrors.push(`error:${event.message}`);
      });

      win.addEventListener('unhandledrejection', (event) => {
        runtimeErrors.push(`rejection:${event.reason?.message || event.reason}`);
      });

      const heroCopy = doc.querySelector('.ascii-home-copy');
      const heroFrame = doc.querySelector('[data-ascii-hero]');
      const asciiOutput = doc.querySelector('[data-ascii-output]');
      const fallbackImage = doc.querySelector('[data-ascii-fallback]');
      const actions = doc.querySelector('.ascii-home-actions');
      const projectsButton = doc.querySelector('.ascii-home-actions a[href="/projects/"]');

      assert(Boolean(heroCopy && heroFrame && asciiOutput && fallbackImage && actions && projectsButton), 'homepage renders the ASCII hero structure and CTA buttons');

      await sleep(900);

      const heroState = heroFrame.dataset.asciiState;
      assert(heroState === 'ready' || heroState === 'fallback', 'hero reaches a stable ready or fallback state');

      if (heroState === 'ready') {
        const denseGlyphs = asciiOutput.textContent.replace(/\s/g, '');
        assert(denseGlyphs.length > 60, 'ASCII output contains a visible rendered glyph field');
      }

      const frameRect = heroFrame.getBoundingClientRect();
      log(`INFO hero frame ${Math.round(frameRect.width)}x${Math.round(frameRect.height)} in frame ${frameWidth}`);

      if (frameWidth <= 520) {
        assert(frameRect.width <= frameWidth - 20, 'hero frame fits comfortably within the mobile viewport');
        const copyRect = heroCopy.getBoundingClientRect();
        assert(copyRect.top > frameRect.bottom - 2, 'copy stacks beneath the visual on mobile');
      } else {
        assert(frameRect.width >= 320, 'hero frame keeps strong desktop presence');
        const copyRect = heroCopy.getBoundingClientRect();
        assert(Math.abs(copyRect.top - frameRect.top) < 180, 'copy and visual stay visually aligned on desktop');
      }

      projectsButton.scrollIntoView({ block: 'center' });
      await sleep(20);
      const buttonRect = projectsButton.getBoundingClientRect();
      const topAtButton = doc.elementFromPoint(buttonRect.left + buttonRect.width / 2, buttonRect.top + buttonRect.height / 2);
      assert(topAtButton === projectsButton || projectsButton.contains(topAtButton), 'CTA buttons are not covered by the ASCII layer');

      assert(runtimeErrors.length === 0, 'homepage ASCII hero stays free of runtime errors');

      log('PASS smoke test completed');
      document.body.dataset.testStatus = 'PASS';
    }
  </script>
</body>
</html>
