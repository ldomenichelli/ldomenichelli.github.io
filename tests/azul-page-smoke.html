<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Azul Page Smoke Test</title>
  <style>
    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: #111;
      color: #f5f5f5;
      margin: 0;
      padding: 16px;
    }

    iframe {
      width: 1440px;
      height: 2600px;
      border: 0;
    }

    pre {
      white-space: pre-wrap;
      margin: 0 0 16px;
      line-height: 1.45;
    }
  </style>
</head>
<body data-test-status="RUNNING">
  <pre id="log">Running...</pre>
  <iframe id="frame" src="/games/azul/"></iframe>
  <script>
    const logEl = document.getElementById('log');
    const frame = document.getElementById('frame');
    const results = [];
    const params = new URLSearchParams(window.location.search);
    const frameWidth = Number(params.get('width') || '1440');
    frame.style.width = `${frameWidth}px`;

    function log(message) {
      results.push(message);
      logEl.textContent = results.join('\n');
    }

    function assert(condition, message) {
      if (!condition) throw new Error(message);
      log(`PASS ${message}`);
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function changeSelect(select, value) {
      select.value = value;
      select.dispatchEvent(new Event('change', { bubbles: true }));
    }

    function first(doc, selector) {
      const element = doc.querySelector(selector);
      if (!element) throw new Error(`Missing selector ${selector}`);
      return element;
    }

    frame.addEventListener('load', () => {
      run().catch((error) => {
        log(`FAIL ${error.message}`);
        document.body.dataset.testStatus = 'FAIL';
      });
    });

    async function run() {
      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      const runtimeErrors = [];

      win.addEventListener('error', (event) => {
        runtimeErrors.push(`error:${event.message}`);
      });

      win.addEventListener('unhandledrejection', (event) => {
        runtimeErrors.push(`rejection:${event.reason?.message || event.reason}`);
      });

      const arena = doc.querySelector('[data-azul-arena]');
      const factories = doc.querySelector('[data-factories]');
      const center = doc.querySelector('[data-center]');
      const boards = doc.querySelector('[data-boards]');
      const history = doc.querySelector('[data-history]');
      const status = doc.querySelector('[data-status]');
      const turn = doc.querySelector('[data-turn]');
      const mode = doc.querySelector('[data-mode]');
      const seat = doc.querySelector('[data-seat]');
      const difficulty = doc.querySelector('[data-difficulty]');
      const thinking = doc.querySelector('[data-thinking]');
      const newGame = doc.querySelector('[data-new-game]');
      const undo = doc.querySelector('[data-undo]');
      const tabRules = doc.querySelector('[data-tab-button="rules"]');
      const tabPlay = doc.querySelector('[data-tab-button="play"]');
      const tabTips = doc.querySelector('[data-tab-button="tips"]');
      const panelRules = doc.querySelector('[data-tab-panel="rules"]');
      const panelPlay = doc.querySelector('[data-tab-panel="play"]');
      const panelTips = doc.querySelector('[data-tab-panel="tips"]');
      const sideRail = doc.querySelector('.game-shell-side');

      assert(Boolean(arena && factories && center && boards && history && status && turn && mode && seat && difficulty && thinking && newGame && undo && tabRules && tabPlay && tabTips && panelRules && panelPlay && panelTips && sideRail), 'page renders arena, controls, and help tabs');
      assert(doc.querySelectorAll('.azul-factory').length === 5, 'page renders the 5 official factory displays for 2-player Azul');
      assert(doc.querySelectorAll('.azul-player-board').length === 2, 'page renders both player boards');

      const arenaRect = arena.getBoundingClientRect();
      log(`INFO arena ${Math.round(arenaRect.width)}x${Math.round(arenaRect.height)} in frame ${frameWidth}`);
      if (frameWidth <= 480) {
        assert(arenaRect.width >= 260, 'arena stays readable on mobile');
      } else {
        assert(arenaRect.width >= 320, 'arena stays readable on desktop');
      }

      const sideRect = sideRail.getBoundingClientRect();
      assert(sideRect.width >= 280, 'side rail keeps a comfortable desktop width');
      assert(thinking.classList.contains('hidden'), 'thinking indicator is hidden on initial load');
      assert(status.textContent.includes('to draft') || status.textContent.includes('Choose a factory'), 'initial status explains the opening interaction');

      tabPlay.click();
      await sleep(20);
      assert(!panelPlay.classList.contains('hidden') && panelRules.classList.contains('hidden'), 'How to play tab switches panels');

      tabTips.click();
      await sleep(20);
      assert(!panelTips.classList.contains('hidden') && panelPlay.classList.contains('hidden'), 'Strategy tips tab switches panels');

      tabRules.click();
      await sleep(20);
      assert(!panelRules.classList.contains('hidden') && panelTips.classList.contains('hidden'), 'Rules tab restores the rules panel');

      first(doc, '.azul-source-button[data-source-kind="FACTORY"]').click();
      await sleep(20);
      const legalLine = doc.querySelector('.azul-player-board.is-current .azul-pattern-line.is-legal[data-destination-kind="PATTERN_LINE"]')
        || first(doc, '.azul-player-board.is-current .azul-pattern-line[data-destination-kind="FLOOR"]');
      legalLine.click();
      await sleep(40);
      assert(turn.textContent.includes('Player 2') || turn.textContent.includes('Computer') || turn.textContent.includes('You'), 'a legal draft-and-place sequence advances the turn');
      assert(history.textContent.includes('Factory') || history.textContent.includes('Center'), 'move history records the first action');
      assert(undo.disabled === false, 'undo enables after a move');

      undo.click();
      await sleep(30);
      assert(history.textContent.includes('No moves yet.'), 'undo restores the opening state');

      newGame.click();
      await sleep(30);
      assert(history.textContent.includes('No moves yet.'), 'new game resets move history');

      changeSelect(mode, 'HUMAN_VS_COMPUTER');
      await sleep(20);
      assert(seat.disabled === false && difficulty.disabled === false, 'seat and difficulty are editable in human vs computer mode');

      changeSelect(difficulty, 'Hard');
      await sleep(20);
      assert(difficulty.value === 'Hard', 'difficulty control updates correctly');

      changeSelect(seat, '1');
      await sleep(40);
      assert(!thinking.classList.contains('hidden'), 'thinking indicator appears while the AI opens for the second-player seat');

      await sleep(600);
      assert(thinking.classList.contains('hidden'), 'thinking indicator clears after the AI move');
      assert(turn.textContent.includes('You') || status.textContent.includes('Choose exactly one destination') || status.textContent.includes('to draft'), 'after the AI move, the human seat regains control');

      undo.click();
      await sleep(30);
      assert(history.textContent.includes('No moves yet.'), 'undo rewinds the AI opening move for the second-player seat');

      changeSelect(mode, 'HUMAN_VS_HUMAN');
      await sleep(20);
      assert(seat.disabled === true && difficulty.disabled === true, 'HVC-only setup controls lock again in HVH mode');
      assert(runtimeErrors.length === 0, 'page interactions stay free of runtime errors');

      log('PASS smoke test completed');
      document.body.dataset.testStatus = 'PASS';
    }
  </script>
</body>
</html>
