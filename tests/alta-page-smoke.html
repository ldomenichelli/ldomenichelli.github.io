<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alta Page Smoke Test</title>
  <style>
    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: #111;
      color: #f5f5f5;
      margin: 0;
      padding: 16px;
    }

    iframe {
      width: 1440px;
      height: 2200px;
      border: 0;
    }

    pre {
      white-space: pre-wrap;
      margin: 0 0 16px;
      line-height: 1.45;
    }
  </style>
</head>
<body data-test-status="RUNNING">
  <pre id="log">Running...</pre>
  <iframe id="frame" src="/games/alta/"></iframe>
  <script>
    const logEl = document.getElementById('log');
    const frame = document.getElementById('frame');
    const results = [];
    const params = new URLSearchParams(window.location.search);
    const frameWidth = Number(params.get('width') || '1440');
    frame.style.width = `${frameWidth}px`;

    function log(message) {
      results.push(message);
      logEl.textContent = results.join('\n');
    }

    function assert(condition, message) {
      if (!condition) throw new Error(message);
      log(`PASS ${message}`);
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function changeSelect(select, value) {
      select.value = value;
      select.dispatchEvent(new Event('change', { bubbles: true }));
    }

    function click(doc, selector) {
      const el = doc.querySelector(selector);
      if (!el) throw new Error(`Missing selector ${selector}`);
      el.click();
      return el;
    }

    frame.addEventListener('load', () => {
      run().catch((error) => {
        log(`FAIL ${error.message}`);
        document.body.dataset.testStatus = 'FAIL';
      });
    });

    async function run() {
      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      const runtimeErrors = [];

      win.addEventListener('error', (event) => {
        runtimeErrors.push(`error:${event.message}`);
      });

      win.addEventListener('unhandledrejection', (event) => {
        runtimeErrors.push(`rejection:${event.reason?.message || event.reason}`);
      });

      const board = doc.querySelector('[data-alta-board]');
      const boardStage = doc.querySelector('[data-alta-stage]');
      const status = doc.querySelector('[data-status]');
      const history = doc.querySelector('[data-history]');
      const mode = doc.querySelector('[data-mode]');
      const side = doc.querySelector('[data-side]');
      const difficulty = doc.querySelector('[data-difficulty]');
      const thinking = doc.querySelector('[data-thinking]');
      const newGame = doc.querySelector('[data-new-game]');
      const undo = doc.querySelector('[data-undo]');
      const tabRules = doc.querySelector('[data-tab-button="rules"]');
      const tabPlay = doc.querySelector('[data-tab-button="play"]');
      const tabTips = doc.querySelector('[data-tab-button="tips"]');
      const panelRules = doc.querySelector('[data-tab-panel="rules"]');
      const panelPlay = doc.querySelector('[data-tab-panel="play"]');
      const panelTips = doc.querySelector('[data-tab-panel="tips"]');
      const sideRail = doc.querySelector('.game-shell-side');

      assert(Boolean(board && boardStage && status && history && mode && side && difficulty && thinking && newGame && undo && tabRules && tabPlay && tabTips && panelRules && panelPlay && panelTips && sideRail), 'page renders Alta board, controls, and guide tabs');
      assert(doc.querySelectorAll('.alta-cell').length === 57, 'board renders the full 57-cell playable diamond');

      const boardRect = boardStage.getBoundingClientRect();
      log(`INFO board ${Math.round(boardRect.width)}x${Math.round(boardRect.height)} in frame ${frameWidth}`);
      if (frameWidth <= 480) {
        assert(boardRect.width >= 260 && boardRect.height >= 260, 'board stays readable on mobile');
      } else {
        assert(boardRect.width >= 320 && boardRect.height >= 320, 'board stays readable on desktop');
        assert(boardRect.width <= 700, 'board stays visually bounded on desktop');
      }

      const sideRect = sideRail.getBoundingClientRect();
      assert(sideRect.width >= 280, 'side rail keeps a comfortable desktop width');
      assert(status.textContent.includes('Blue to move'), 'initial status describes the opening turn');
      assert(thinking.classList.contains('hidden'), 'thinking indicator is hidden on initial load');

      click(doc, '[data-tab-button="play"]');
      await sleep(20);
      assert(!panelPlay.classList.contains('hidden') && panelRules.classList.contains('hidden'), 'How to play tab switches panels');

      click(doc, '[data-tab-button="tips"]');
      await sleep(20);
      assert(!panelTips.classList.contains('hidden') && panelPlay.classList.contains('hidden'), 'Strategy tips tab switches panels');

      click(doc, '[data-tab-button="rules"]');
      await sleep(20);
      assert(!panelRules.classList.contains('hidden') && panelTips.classList.contains('hidden'), 'Rules tab restores the rules panel');

      click(doc, '.alta-empty-hit[data-cell="d9"]');
      await sleep(20);
      assert(Boolean(doc.querySelector('.alta-choice-fw[data-cell="d9"]')) && Boolean(doc.querySelector('.alta-choice-bw[data-cell="d9"]')), 'selecting an empty square reveals both orientation choices');

      click(doc, '.alta-choice-fw[data-cell="d9"]');
      await sleep(20);
      assert(status.textContent.includes('Red to move'), 'placing a switch advances the turn in human vs human mode');
      assert(history.textContent.includes('d9 /'), 'move history records the placement notation');
      assert(undo.disabled === false, 'undo enables after the first move');

      click(doc, '.alta-empty-hit[data-cell="a5"]');
      await sleep(20);
      click(doc, '.alta-choice-bw[data-cell="a5"]');
      await sleep(20);
      assert(status.textContent.includes('Blue to move'), 'second human move advances back to blue');

      click(doc, '.alta-toggle-hit[data-cell="d9"]');
      await sleep(20);
      assert(history.textContent.includes('toggle d9'), 'clicking one of your own switches toggles it and records the move');

      undo.click();
      await sleep(20);
      assert(!history.textContent.includes('toggle d9'), 'undo removes the latest move');

      newGame.click();
      await sleep(20);
      assert(history.textContent.includes('No moves yet.'), 'new game resets the move history');

      changeSelect(mode, 'HUMAN_VS_COMPUTER');
      await sleep(20);
      assert(mode.value === 'HUMAN_VS_COMPUTER', 'mode switch updates to human vs computer');
      assert(side.disabled === false && difficulty.disabled === false, 'side and difficulty become editable in HVC mode');

      changeSelect(difficulty, 'Hard');
      await sleep(20);
      assert(difficulty.value === 'Hard', 'difficulty control updates correctly');

      changeSelect(side, 'RED');
      await sleep(40);
      assert(side.value === 'RED', 'side control updates correctly');
      assert(!thinking.classList.contains('hidden'), 'thinking indicator appears while the AI takes the opening move for blue');

      await sleep(450);
      assert(thinking.classList.contains('hidden'), 'thinking indicator clears after the AI move finishes');
      assert(status.textContent.includes('Red to move'), 'after the AI opening move, the human side gets the turn');

      undo.click();
      await sleep(20);
      assert(history.textContent.includes('No moves yet.') && thinking.classList.contains('hidden'), 'undo restores the pre-AI opening position when the human plays red');

      changeSelect(mode, 'HUMAN_VS_HUMAN');
      await sleep(20);
      assert(side.disabled === true && difficulty.disabled === true, 'HVC-only setup controls lock again in HVH mode');
      assert(runtimeErrors.length === 0, 'page interactions stay free of runtime errors');

      log('PASS page smoke test completed');
      document.body.dataset.testStatus = 'PASS';
    }
  </script>
</body>
</html>
