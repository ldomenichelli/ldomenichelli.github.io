<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-labelledby="title desc">
  <title id="title">Paper thumbnail for The Role of Eye-Tracking Data in Encoder-Based Models</title>
  <desc id="desc">First-page style thumbnail for the CLiC-it paper.</desc>
  <rect width="640" height="480" fill="#fbf6df"/>
  <rect x="34" y="28" width="572" height="424" fill="#fffdf6" stroke="#4f241f" stroke-width="2"/>
  <g fill="#171717" font-family="Georgia, 'Times New Roman', serif">
    <text x="58" y="78" font-size="30" font-weight="700">The Role of Eye-Tracking Data in</text>
    <text x="58" y="114" font-size="30" font-weight="700">Encoder-Based Models: an</text>
    <text x="58" y="150" font-size="30" font-weight="700">In-depth Linguistic Analysis</text>
    <text x="58" y="194" font-size="18">Lucia Domenichelli, Luca Dini, Dominique Brunato</text>
    <text x="58" y="220" font-size="18">and Felice Dell'Orletta</text>
  </g>
  <g fill="#60433a" font-family="Georgia, 'Times New Roman', serif">
    <text x="58" y="256" font-size="13" font-style="italic">ItaliaNLP Lab, Istituto di Linguistica Computazionale</text>
    <text x="58" y="274" font-size="13" font-style="italic">University of Pisa</text>
  </g>
  <g fill="#171717" font-family="Georgia, 'Times New Roman', serif">
    <text x="92" y="320" font-size="18" font-weight="700">Abstract</text>
    <text x="92" y="344" font-size="12">This paper investigates how eye-tracking data can guide</text>
    <text x="92" y="362" font-size="12">encoder-based models and support linguistic analysis.</text>
    <text x="92" y="380" font-size="12">We compare attention, representation shifts, and human</text>
    <text x="92" y="398" font-size="12">reading signals across multilingual settings.</text>
    <text x="92" y="430" font-size="14" font-weight="700">Keywords</text>
    <text x="92" y="450" font-size="12">Eye-tracking, Neural Attention, multilingual models</text>
  </g>
</svg>
