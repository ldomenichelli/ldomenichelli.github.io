<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-labelledby="title desc">
  <title id="title">Paper thumbnail for pretraining data ordering</title>
  <desc id="desc">First-page style thumbnail for the Knowledge-Based Systems paper.</desc>
  <rect width="640" height="480" fill="#fbf6df"/>
  <rect x="28" y="24" width="584" height="432" fill="#fffdf6" stroke="#4f241f" stroke-width="2"/>
  <g font-family="Georgia, 'Times New Roman', serif" fill="#171717">
    <rect x="46" y="42" width="548" height="76" fill="#e8e6df"/>
    <text x="226" y="74" font-size="22">Knowledge-Based Systems</text>
    <text x="226" y="100" font-size="12">journal homepage: www.elsevier.com/locate/knosys</text>
    <text x="46" y="164" font-size="24">On the impact of pretraining data ordering</text>
    <text x="46" y="194" font-size="24">in transformer encoder- and decoder-only</text>
    <text x="46" y="224" font-size="24">language models</text>
    <text x="46" y="266" font-size="16">Luca Dini, Lucia Domenichelli, Dominique Brunato</text>
    <text x="46" y="288" font-size="16">and Felice Dell'Orletta</text>
  </g>
  <line x1="46" y1="318" x2="594" y2="318" stroke="#171717" stroke-width="1"/>
  <g font-family="Georgia, 'Times New Roman', serif" fill="#171717">
    <text x="46" y="354" font-size="16" letter-spacing="8">ARTICLE INFO</text>
    <text x="336" y="354" font-size="16" letter-spacing="8">ABSTRACT</text>
    <text x="46" y="384" font-size="12" font-style="italic">Keywords:</text>
    <text x="46" y="404" font-size="11">Curriculum learning</text>
    <text x="46" y="420" font-size="11">Data ordering</text>
    <text x="336" y="384" font-size="11">Pretraining large language models typically relies</text>
    <text x="336" y="400" font-size="11">on randomly ordered corpora. Here, curriculum</text>
    <text x="336" y="416" font-size="11">strategies are examined across transformer models.</text>
  </g>
</svg>
