  <style>
    html {
      background: #f7f5ed;
    }

    body.chamber-page {
      --chamber-ink: #15100d;
      --chamber-paper: #fbfaf4;
      --chamber-paper-soft: #eee8d9;
      --chamber-green: #1b6f6a;
      background:
        radial-gradient(circle at 18% 24%, rgba(88, 51, 32, 0.08) 0 1px, transparent 1px),
        radial-gradient(circle at 72% 38%, rgba(27, 111, 106, 0.08) 0 1px, transparent 1px),
        linear-gradient(180deg, #f7f5ed 0%, #e8dfca 100%);
      background-size: 7px 7px, 11px 11px, auto;
      color: var(--chamber-ink);
    }

    body.chamber-page::after {
      display: none;
    }

    body.chamber-page .header {
      background: transparent;
      border: 0;
    }

    body.chamber-page .main,
    body.chamber-page .footer {
      max-width: min(1060px, calc(100vw - 40px));
    }

    body.chamber-page .post-single {
      background: transparent;
      border: 0;
      padding: 0 0 2rem;
    }

    body.chamber-page .post-single::before {
      content: none;
    }

    .chamber-intro {
      margin: 0 auto 0.8rem;
      max-width: 760px;
      padding: 0.6rem 0.8rem;
      text-align: right;
      text-wrap: balance;
    }

    .chamber-intro h1 {
      color: var(--chamber-ink);
      font-size: clamp(1.55rem, 4vw, 2.1rem);
      line-height: 1.05;
      margin: 0 0 0.35rem;
      text-transform: none;
    }

    .chamber-intro p {
      color: #3a2b22;
      margin: 0;
    }

    .chamber-room {
      margin: 0 auto;
      max-width: 560px;
      text-align: center;
    }

    .chamber-panel {
      display: grid;
      min-height: auto;
      overflow: visible;
      padding: 0.8rem 0 0.4rem;
      place-items: center;
      position: relative;
    }

    .chamber-link-box {
      display: grid;
      justify-items: center;
      width: 100%;
    }

    .chamber-link-box > summary {
      cursor: pointer;
      display: grid;
      justify-items: center;
      list-style: none;
      outline: none;
      width: 100%;
    }

    .chamber-link-box > summary::-webkit-details-marker {
      display: none;
    }

    .chamber-link-box > summary:focus-visible .chamber-instrument {
      outline: 2px solid var(--chamber-green);
      outline-offset: 6px;
    }

    .chamber-instrument {
      filter: drop-shadow(18px 22px 9px rgba(16, 9, 47, 0.24));
      image-rendering: pixelated;
      max-height: clamp(240px, 45vw, 430px);
      object-fit: contain;
      position: relative;
      transform-origin: center bottom;
      transition:
        filter 180ms ease,
        transform 180ms ease;
      width: min(340px, 74vw);
      z-index: 3;
    }

    .chamber-instrument:hover {
      filter: hue-rotate(190deg) saturate(0.58) contrast(1.05) drop-shadow(18px 22px 9px rgba(16, 9, 47, 0.24));
      transform: rotate(2deg) translateY(-2px);
    }

    .chamber-link-list {
      background: var(--chamber-paper-soft);
      border: 1px dashed #19110d;
      box-shadow: 4px 4px rgba(0, 0, 0, 0.2);
      margin: 1rem auto 0;
      max-width: min(520px, 100%);
      padding: 0.8rem 1rem;
      text-align: left;
      width: 100%;
    }

    .chamber-link-list ol {
      margin: 0;
      padding-left: 1.3rem;
    }

    .chamber-link-list li + li {
      margin-top: 0.45rem;
    }

    .chamber-link-list a {
      overflow-wrap: anywhere;
    }

    .chamber-empty-note {
      background: var(--chamber-paper-soft);
      border: 1px dashed #19110d;
      box-shadow: 4px 4px rgba(0, 0, 0, 0.2);
      margin: 1.15rem auto 0;
      max-width: 640px;
      padding: 0.8rem;
      text-align: center;
    }

    .chamber-empty-note p {
      color: #3a2b22;
      font-size: 0.86rem;
      line-height: 1.6;
      margin: 0;
    }

    body.chamber-page .site-music-player {
      bottom: 16px;
      top: auto;
    }

    @media screen and (max-width: 899px) {
      body.chamber-page .main,
      body.chamber-page .footer {
        max-width: var(--mobile-content-width);
        width: var(--mobile-content-width);
      }

      body.chamber-page .header {
        box-sizing: border-box;
      }

      .chamber-intro {
        padding-inline: 0;
        text-align: left;
      }

      body.chamber-page .site-music-player {
        bottom: auto;
        margin-left: 0;
      }
    }

    @media screen and (max-width: 520px) {
      body.chamber-page .header {
        width: min(100%, 390px);
      }

      body.chamber-page .main,
      body.chamber-page .footer {
        max-width: min(var(--mobile-content-width), 354px);
        width: min(var(--mobile-content-width), 354px);
      }

      .chamber-room,
      .chamber-empty-note {
        max-width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .chamber-panel {
        transition: none;
      }

      .chamber-room:hover .chamber-panel,
      .chamber-panel:hover {
        transform: none;
      }

      .chamber-instrument {
        transition: none;
      }

      .chamber-instrument:hover {
        transform: none;
      }
    }
  </style>
