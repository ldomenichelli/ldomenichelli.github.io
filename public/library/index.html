  <style>
    html {
      background: #f7f5ed;
    }

    body.library-page {
      --library-ink: #15100d;
      --library-paper: #fbfaf4;
      --library-paper-soft: #eee8d9;
      --library-teal: #1b6f6a;
      background:
        radial-gradient(circle at 18% 24%, rgba(88, 51, 32, 0.08) 0 1px, transparent 1px),
        radial-gradient(circle at 72% 38%, rgba(27, 111, 106, 0.08) 0 1px, transparent 1px),
        linear-gradient(180deg, #f7f5ed 0%, #e8dfca 100%);
      background-size: 7px 7px, 11px 11px, auto;
      color: var(--library-ink);
    }

    body.library-page::after {
      display: none;
    }

    body.library-page .header {
      background: transparent;
      border: 0;
    }

    body.library-page .main,
    body.library-page .footer {
      max-width: min(1060px, calc(100vw - 40px));
    }

    body.library-page .post-single {
      background: transparent;
      border: 0;
      padding: 0 0 2rem;
    }

    body.library-page .post-single::before {
      content: none;
    }

    .library-intro {
      margin: 0 auto 0.8rem;
      max-width: 720px;
      padding: 0.6rem 0.8rem;
      text-align: right;
      text-wrap: balance;
    }

    .library-intro h1 {
      color: var(--library-ink);
      font-size: clamp(1.55rem, 4vw, 2.1rem);
      line-height: 1.05;
      margin: 0 0 0.35rem;
      text-transform: none;
    }

    .library-intro p {
      color: #3a2b22;
      margin: 0;
    }

    .library-room {
      margin: 0 auto;
      max-width: 1000px;
      position: relative;
      text-align: center;
    }

    .library-shelf-frame {
      align-items: center;
      background: transparent;
      box-shadow:
        6px 8px 0 rgba(0, 0, 0, 0.2);
      display: inline-flex;
      filter: contrast(1.04) saturate(0.86);
      justify-content: center;
      margin: 0;
      max-width: 100%;
      overflow: hidden;
      position: relative;
      transform-origin: center;
      transition:
        filter 180ms ease,
        transform 180ms ease;
      width: fit-content;
      image-rendering: pixelated;
    }

    .library-room:hover .library-shelf-frame,
    .library-shelf-frame:hover {
      filter: hue-rotate(190deg) saturate(0.5) contrast(1.04);
      transform: rotate(8deg);
    }

    .library-shelf-frame::before,
    .library-shelf-frame::after {
      content: "";
      inset: 0;
      pointer-events: none;
      position: absolute;
      z-index: 1;
    }

    .library-shelf-frame::before {
      background:
        linear-gradient(135deg, rgba(48, 22, 10, 0.22), transparent 42%),
        linear-gradient(315deg, rgba(48, 22, 10, 0.18), transparent 36%);
    }

    .library-shelf-frame::after {
      background:
        radial-gradient(circle, rgba(36, 18, 8, 0.24) 0 1px, transparent 1px) 0 0 / 4px 4px,
        radial-gradient(circle, rgba(255, 232, 176, 0.2) 0 1px, transparent 1px) 2px 2px / 4px 4px;
      mix-blend-mode: multiply;
      opacity: 0.75;
    }

    .library-shelf-image {
      display: block;
      height: auto;
      max-height: min(620px, calc(100vh - 185px));
      max-width: 100%;
      object-fit: contain;
      width: auto;
    }

    .library-book {
      align-items: center;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.26), transparent 26%, rgba(0, 0, 0, 0.24)),
        #315f37;
      border: 1px solid rgba(31, 16, 9, 0.84);
      bottom: 10.8%;
      box-shadow:
        inset 3px 0 rgba(255, 255, 255, 0.16),
        inset -3px 0 rgba(0, 0, 0, 0.2),
        2px 2px 0 rgba(0, 0, 0, 0.24),
        0 4px 0 rgba(35, 18, 9, 0.38);
      color: #fff8dc;
      display: flex;
      font-weight: 700;
      height: 22%;
      justify-content: center;
      left: 12%;
      line-height: 1;
      min-height: 50px;
      min-width: 16px;
      padding: 0.25rem 0.1rem;
      position: absolute;
      text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.48);
      width: 5%;
      writing-mode: vertical-rl;
      z-index: 2;
    }

    .library-book::after {
      background:
        radial-gradient(circle, rgba(18, 10, 6, 0.2) 0 1px, transparent 1px) 0 0 / 3px 3px;
      content: "";
      inset: 0;
      mix-blend-mode: multiply;
      opacity: 0.68;
      pointer-events: none;
      position: absolute;
    }

    .library-book span {
      color: inherit;
      font-size: clamp(0.68rem, 1.35vw, 0.92rem);
      position: relative;
      z-index: 1;
    }

    .library-empty-note {
      background: var(--library-paper-soft);
      border: 1px dashed #19110d;
      box-shadow: 4px 4px rgba(0, 0, 0, 0.2);
      margin: 1.15rem auto 0;
      max-width: 640px;
      padding: 0.8rem;
      text-align: center;
    }

    .library-empty-note p {
      color: #3a2b22;
      font-size: 0.86rem;
      line-height: 1.6;
      margin: 0;
    }

    body.library-page .site-music-player {
      bottom: 16px;
      top: auto;
    }

    @media screen and (max-width: 899px) {
      body.library-page .main,
      body.library-page .footer {
        max-width: var(--mobile-content-width);
        width: var(--mobile-content-width);
      }

      body.library-page .header {
        box-sizing: border-box;
      }

      .library-intro {
        padding-inline: 0;
        text-align: left;
      }

      .library-shelf-image {
        max-height: none;
        width: 100%;
      }

      body.library-page .site-music-player {
        bottom: auto;
        margin-left: 0;
      }
    }

    @media screen and (max-width: 520px) {
      body.library-page .header {
        width: min(100%, 390px);
      }

      body.library-page .main,
      body.library-page .footer {
        max-width: min(var(--mobile-content-width), 354px);
        width: min(var(--mobile-content-width), 354px);
      }

      .library-room,
      .library-empty-note {
        max-width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .library-shelf-frame {
        transition: none;
      }

      .library-room:hover .library-shelf-frame,
      .library-shelf-frame:hover {
        transform: none;
      }
    }
  </style>
